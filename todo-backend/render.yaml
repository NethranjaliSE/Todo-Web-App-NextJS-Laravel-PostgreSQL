    name: todo-backend
    env: standard
    runtime: php-8.1
    # buildCommand runs during Render build phase
    buildCommand: ./render-build.sh
    # startCommand should bind to $PORT provided by Render (serves `public` directory)
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: "base64:Ogl+66cV8AFQMzX/horwenj6XCSfmmqNQ3lFnwz0/f8="
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: "https://<your-render-service>.onrender.com"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: "ep-young-block-aph0fuod.c-7.us-east-1.aws.neon.tech"
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: "neondb"
      - key: DB_USERNAME
        value: "neondb_owner"
      - key: DB_PASSWORD
        value: "npg_H9DKW8IZiPxL"
      - key: DB_SSLMODE
        value: require
