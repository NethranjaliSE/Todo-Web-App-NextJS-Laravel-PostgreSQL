services:
  - type: web
    name: todo-backend
    env: php
    # buildCommand runs during Render build phase
    buildCommand: ./render-build.sh
    # startCommand should bind to $PORT provided by Render
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    root: public
    # Optional health check path
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: "<your_app_key_here>"
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: "https://<your-render-service>.onrender.com"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: "<your_db_host>"
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: "<your_db_name>"
      - key: DB_USERNAME
        value: "<your_db_user>"
      - key: DB_PASSWORD
        value: "<your_db_password>"
      - key: DB_SSLMODE
        value: require
      # You can alternatively set a single connection string via DATABASE_URL
      - key: DATABASE_URL
        value: "<your_database_url_or_empty>"
